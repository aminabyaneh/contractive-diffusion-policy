defaults:
  - _self_
  - task: kitchen-mixed-v0 # TODO: kitchen-complete-v0 might be easier

pipeline_name: dql_d4rl_kitchen
mode: train
method: dql
seed: 0
device: cuda:0
log_dir: logs

# Environment
discount: 0.99

# Actor
solver: ddpm
diffusion_steps: 5
sampling_steps: 5
predict_noise: True
ema_rate: 0.995
actor_learning_rate: 0.0003

# Critic
hidden_dim: 256
critic_learning_rate: 0.0003

# Wandb
wandb_mode: offline
project: barrierdiffuser
group: kitchen
exp_name: dqrl

# Training
gradient_steps: 2000000
batch_size: 256
ema_update_interval: 5
log_interval: 5000
save_interval: 50000
eval_interval: 50000

# Inference
ckpt: latest
num_envs: 50
num_episodes: 3
num_candidates: 50
temperature: 0.5
use_ema: True

# hydra
hydra:
  job:
    chdir: false
  run:
    dir: logs
  output_subdir: null
