defaults:
  - _self_
  - task: kitchen-mixed-v0

pipeline_name: edp_d4rl_kitchen
mode: train
method: edp
seed: 0
device: cuda:0
log_dir: logs

# Environment
discount: 0.99

# Actor
solver: ode_dpmsolver++_2M
diffusion_steps: 50
sampling_steps: 15
ema_rate: 0.995
actor_learning_rate: 0.0003

# Critic
hidden_dim: 256
critic_learning_rate: 0.0003

# Wandb
wandb_mode: online
project: barrierdiffuser
group: kitchen
exp_name: edp

# Training
gradient_steps: 2000000
batch_size: 256
ema_update_interval: 5
log_interval: 200
save_interval: 50000
eval_interval: 10000

# Inference
ckpt: latest
num_envs: 50
num_episodes: 3
num_candidates: 50
temperature: 0.5
use_ema: True

# hydra
hydra:
  job:
    chdir: false
  run:
    dir: logs
  output_subdir: null


